<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar contraseña</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-page">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card card-glass p-4">
                    <div class="card-body">
                        <h2 class="text-white text-center mb-4">
                            <i class="bi bi-shield-lock-fill text-warning me-2"></i>Cambiar contraseña
                        </h2>
                        <p class="text-secondary text-center mb-4" id="mensajeUsuario"></p>
                        
                        <div id="msg"></div>
                        
                        <form id="formCambiarPassword">
                            <input type="hidden" id="user" value="">
                            
                            <div class="mb-3">
                                <label class="form-label text-light">Nueva contraseña</label>
                                <input type="password" id="newPass" class="form-control form-control-glass" placeholder="Mínimo 6 caracteres" required>
                                <div id="errorPass" class="small mt-1"></div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-light">Confirmar contraseña</label>
                                <input type="password" id="confirmPass" class="form-control form-control-glass" placeholder="Repite tu contraseña" required>
                                <div id="errorConfirm" class="text-danger small mt-1"></div>
                            </div>
                            <button type="submit" class="btn btn-orange text-white w-100 py-2 fw-semibold">
                                <i class="bi bi-save me-2"></i>Actualizar contraseña
                            </button>
                        </form>
                        
                        <div class="text-center mt-4">
                            <a href="login.html" class="text-secondary text-decoration-none">
                                <i class="bi bi-arrow-left me-1"></i>Volver al login
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>

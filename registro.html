<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro</title>
<link rel="stylesheet" href="css/styles.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <div class="logo">Grupo 9</div>
    <div class="user">
       <span><i class="fa-solid fa-arrow-right-to-bracket"></i>Login</span>
    </div>
</header>

<div class="layout">

<aside class="sidebar">
    <nav>
        <ul>
            <li><a href="index.html">Dashboard</a></li>
            <li><a class="active" href="registro.html">Registros</a></li>
            <li><a href="#">Reportes</a></li>
            <li><a href="#">Configuración</a></li>
        </ul>
    </nav>
</aside>

<main class="main">

<section class="form-container">
    <h1>Nuevo Registro</h1>
    <p class="form-subtitle">Complete la información requerida.</p>

    <form class="modern-form">

        <div class="input-group">
            <label for="nombre">Nombre Completo</label>
            <input type="text" id="nombre" placeholder="Ej. Juan Pérez" required>
        </div>

        <div class="input-group">
            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" placeholder="ejemplo@email.com" required>
        </div>

        <div class="input-group">
            <label for="telefono">Teléfono</label>
            <input type="tel" id="telefono" placeholder="809-000-0000">
        </div>

        <div class="input-group">
            <label for="rol">Rol</label>
            <select id="rol" required>
                <option value="">Seleccione</option>
                <option>Administrador</option>
                <option>Usuario</option>
                <option>Supervisor</option>
            </select>
        </div>

        <div class="input-group">
            <label for="mensaje">Observaciones</label>
            <textarea id="mensaje" rows="4" placeholder="Notas adicionales..."></textarea>
        </div>

        <button type="submit" class="btn-modern">Guardar Registro</button>

    </form>
</section>

</main>
</div>

<footer class="footer">
      <p>© 2026 Grupo 9</p>
</footer>

</body>
</html>

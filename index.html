<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Grupo 9</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container-fluid p-0">
        <div class="row g-0">
            <!-- Sidebar -->
            <div class="col-auto sidebar p-3">
                <div class="text-center mb-4">
                    <i class="bi bi-box-seam fs-1 text-warning"></i>
                    <h5 class="text-white mt-2">Grupo 9</h5>
                </div>
                <nav class="nav flex-column">
                    <a class="nav-link active mb-2" href="#">
                        <i class="bi bi-speedometer2 me-2"></i>Dashboard
                    </a>
                    <a class="nav-link mb-2" href="registro.html">
                        <i class="bi bi-plus-circle me-2"></i>Registrar Producto
                    </a>
                    <a class="nav-link mb-2" href="reportes.html">
    <i class="bi bi-file-text me-2"></i>Reportes
</a>
                </nav>
            </div>

            <!-- Main Content -->
            <div class="col p-4">
                <!-- Header -->
                <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
                    <div>
                        <h3 class="text-white">Panel de Control</h3>
                        <p class="text-secondary">Resumen general del sistema</p>
                    </div>
                    <div class="d-flex align-items-center gap-3">
                        <span class="text-white">
                            <i class="bi bi-person-circle me-1"></i>
                            <span id="userLogged">Usuario</span>
                        </span>
                        <button onclick="logout()" class="btn-logout">
                            <i class="bi bi-box-arrow-right me-1"></i>Salir
                        </button>
                    </div>
                </div>

                <!-- Cards -->
                <div class="row g-4 mb-4">
                    <div class="col-md-3 col-sm-6">
                        <div class="card card-dashboard p-3">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <p class="text-secondary mb-1">Productos</p>
                                    <h3 id="totalProductos">0</h3>
                                </div>
                                <i class="bi bi-box fs-1 text-warning opacity-50"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3 col-sm-6">
                        <div class="card card-dashboard p-3">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <p class="text-secondary mb-1">Cantidad Total</p>
                                    <h3 id="totalCantidad">0</h3>
                                </div>
                                <i class="bi bi-calculator fs-1 text-info opacity-50"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3 col-sm-6">
                        <div class="card card-dashboard p-3">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <p class="text-secondary mb-1">Valor Total</p>
                                    <h3 id="totalCosto">$0</h3>
                                </div>
                                <i class="bi bi-currency-dollar fs-1 text-success opacity-50"></i>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3 col-sm-6">
                        <div class="card card-dashboard p-3">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <p class="text-secondary mb-1">En Stock</p>
                                    <h3 id="totalStock">0</h3>
                                </div>
                                <i class="bi bi-check-circle fs-1 text-warning opacity-50"></i>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tabla -->
                <div class="table-custom p-3">
                    <h5 class="text-white mb-3">Productos Recientes</h5>
                    <div class="table-responsive">
                        <table class="table table-custom">
                            <thead>
                                <tr>
                                    <th>Producto</th>
                                    <th>Tipo</th>
                                    <th>Cantidad</th>
                                    <th>Costo</th>
                                    <th>Stock</th>
                                    <th>Usuario</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tablaRegistros"></tbody>
                        </table>
                    </div>
                    <div id="paginacion" class="pagination-custom"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Editar -->
    <div class="modal fade" id="modalEditar" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content modal-dark">
                <div class="modal-header">
                    <h5 class="text-white">Editar Producto</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="text-secondary">Nombre</label>
                        <input type="text" id="editNombre" class="form-control form-control-glass">
                    </div>
                    <div class="mb-3">
                        <label class="text-secondary">Tipo</label>
                        <input type="text" id="editTipo" class="form-control form-control-glass">
                    </div>
                    <div class="mb-3">
                        <label class="text-secondary">Cantidad</label>
                        <input type="number" id="editCantidad" class="form-control form-control-glass">
                    </div>
                    <div class="mb-3">
                        <label class="text-secondary">Costo</label>
                        <input type="number" id="editCosto" class="form-control form-control-glass">
                    </div>
                    <div class="mb-3">
                        <label class="text-secondary">Stock</label>
                        <select id="editStock" class="form-select form-select-glass">
                            <option value="">Seleccionar</option>
                            <option value="si">Sí</option>
                            <option value="no">No</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" id="btnGuardar" class="btn btn-orange">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
